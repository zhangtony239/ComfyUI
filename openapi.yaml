    /api/workflows:
        get:
            description: Returns a paginated list of workflows for the authenticated user in the current workspace.
            operationId: listWorkflows
            parameters:
                - in: query
                  name: limit
                  schema:
                    default: 20
                    maximum: 100
                    type: integer
                - in: query
                  name: offset
                  schema:
                    default: 0
                    type: integer
                - description: Search workflows by name (case-insensitive substring match)
                  in: query
                  name: name
                  schema:
                    type: string
                - description: Filter by default view type
                  in: query
                  name: default_view
                  schema:
                    enum:
                        - workflow
                        - app
                    type: string
                - description: Sort field
                  in: query
                  name: sort
                  schema:
                    default: create_time
                    enum:
                        - create_time
                        - update_time
                        - name
                    type: string
                - description: Sort order
                  in: query
                  name: order
                  schema:
                    default: desc
                    enum:
                        - asc
                        - desc
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/WorkflowListResponse'
                    description: Success
                "401":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Unauthorized
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Internal server error
            summary: List workflows
            tags:
                - workflows
        post:
            description: Creates a new workflow with its first version.
            operationId: createWorkflow
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/CreateWorkflowRequest'
                required: true
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/WorkflowResponse'
                    description: Workflow created successfully
                "401":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Unauthorized
                "422":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Validation error
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Internal server error
            summary: Create a new workflow
            tags:
                - workflows
