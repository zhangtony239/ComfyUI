                                $ref: '#/components/schemas/HistoryDetailResponse'
                    description: Success - History for prompt retrieved
                "401":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Unauthorized - Authentication required
