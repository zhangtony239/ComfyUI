        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloudError"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloudError"

  /api/vhs/viewvideo:
    get:
      operationId: viewVhsVideo
      tags: [view]
      summary: View or download VHS video
      description: "[cloud-only] Returns video content from a VHS-processed file."
      x-runtime: [cloud]
      parameters:
        - name: filename
          in: query
          required: true
          schema:
            type: string
          description: Video filename
        - name: type
          in: query
          schema:
            type: string
            enum: [input, output, temp]
          description: Directory type
        - name: subfolder
          in: query
          schema:
            type: string
          description: Subfolder within the directory
      responses:
        "200":
          description: Video content
          content:
            video/*:
              schema:
                type: string
                format: binary
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloudError"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloudError"

  /api/viewvideo:
    get:
      operationId: viewVideo
      tags: [view]
      summary: View or download a video file
      deprecated: true
      description: |
        **Deprecated.** This endpoint is an alias of `GET /api/view` added for
        legacy history-queue video playback. Callers should use `/api/view`
        directly; the endpoint is retained for backward compatibility but will
        be removed in a future release.
      x-runtime: [cloud]
      parameters:
        - name: filename
          in: query
          required: true
          schema:
            type: string
          description: Video filename
        - name: type
          in: query
          schema:
            type: string
            enum: [input, output, temp]
          description: Directory type
        - name: subfolder
          in: query
          schema:
            type: string
          description: Subfolder within the directory
      responses:
        "200":
          description: Video content
          content:
            video/*:
              schema:
                type: string
                format: binary
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloudError"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloudError"

  /api/tasks:
    get:
      operationId: listTasks
      tags: [task]
      summary: List background tasks
      description: "[cloud-only] Retrieve a paginated list of background tasks for the authenticated user. Supports filtering by task type, status, and creation time."
      x-runtime: [cloud]
      parameters:
        - name: task_name
          in: query
          schema:
            type: string
          description: Filter by task type name (exact match).
        - name: idempotency_key
          in: query
          schema:
            type: string
          description: Filter by idempotency key (exact match).
        - name: status
          in: query
          schema:
            type: string
          description: Filter by one or more statuses (comma-separated).
        - name: created_after
          in: query
          schema:
            type: string
            format: date-time
          description: Filter tasks created after this timestamp.
        - name: created_before
          in: query
          schema:
            type: string
            format: date-time
          description: Filter tasks created before this timestamp.
        - name: sort_order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
          description: Sort direction by create_time.
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Pagination offset (0-based).
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Maximum items per page (1-100).
      responses:
        "200":
          description: Tasks retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TasksListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloudError"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloudError"

        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/tasks/{task_id}:
    get:
      operationId: getTask
      tags: [task]
      summary: Get task details
      description: "[cloud-only] Retrieve full details for a specific background task."
      x-runtime: [cloud]
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Task identifier (UUID).
      responses:
        "200":
          description: Task details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloudError"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloudError"

        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  parameters:
    ComfyUserHeader:
      name: Comfy-User
      in: header
      required: false
      schema:
        type: string
      description: |
        Identifies the active user in multi-user mode. Used for settings,
        userdata, and history isolation. This is not a security mechanism —
        it is an organisational convenience with no authentication behind it.

  schemas:
    # -------------------------------------------------------------------
    # Prompt
    # -------------------------------------------------------------------
    PromptRequest:
      type: object
      description: A workflow submission. Wraps the prompt graph plus optional client identifier and extra per-request data.
      required:
        - prompt
      properties:
        prompt:
          type: object
          description: |
            The workflow graph to execute. Keys are node IDs (strings);
            values are objects with class_type and inputs.
          additionalProperties: true
        number:
          type: number
          description: Priority number for the queue (lower numbers have higher priority)
        front:
          type: boolean
          description: If true, adds the prompt to the front of the queue
        extra_data:
          type: object
          description: Extra data associated with the prompt (e.g. extra_pnginfo)
          additionalProperties: true
        client_id:
          type: string
          description: WebSocket client ID to receive progress updates
        prompt_id:
          type: string
          format: uuid
          description: "Client-supplied prompt ID. Server generates a UUID if omitted."
        partial_execution_targets:
          type: array
          items:
            type: string
          description: List of node IDs to execute (partial graph execution)
        workflow_id:
          type: string
          format: uuid
          nullable: true
          x-runtime: [cloud]
          description: "[cloud-only] Cloud workflow entity ID for tracking and gallery association. Ignored by local ComfyUI."
        workflow_version_id:
          type: string
          format: uuid
          nullable: true
          x-runtime: [cloud]
          description: "[cloud-only] Cloud workflow version ID for pinning execution to a specific version. Ignored by local ComfyUI."

    PromptResponse:
      type: object
      description: Server acknowledgement of a workflow submission. Includes the assigned `prompt_id` and current queue position.
      properties:
        prompt_id:
          type: string
          format: uuid
          description: Unique identifier for the prompt execution
        number:
          type: number
          description: Priority number in the queue
        node_errors:
          type: object
          description: Validation errors keyed by node ID
          additionalProperties:
            $ref: "#/components/schemas/NodeError"
        error:
          description: Top-level prompt error (string message or structured error)
          oneOf:
            - type: string
            - $ref: "#/components/schemas/PromptError"

    PromptErrorResponse:
      type: object
      description: Error response when prompt validation fails
      additionalProperties: true

    PromptError:
      type: object
      description: Structured prompt validation error
      properties:
        type:
          type: string
        message:
          type: string
        details:
          type: string

    Error:
      type: object
      description: Detailed node-level error
      properties:
        type:
          type: string
        message:
          type: string
        details:
          type: string
        extra_info:
          type: object
          properties:
            input_name:
              type: string
          additionalProperties: true

    NodeError:
      type: object
      description: Error details for a single node
      properties:
        errors:
          type: array
          items:
            $ref: "#/components/schemas/Error"
        class_type:
          type: string
          description: The node's class type
        dependent_outputs:
          type: array
          items: {}

    PromptInfo:
      type: object
      description: Summary of a queued or recently-executed prompt, as returned by the queue and history endpoints.
      properties:
        exec_info:
          type: object
          properties:
            queue_remaining:
              type: integer
              description: Number of items remaining in the queue

    # -------------------------------------------------------------------
    # Queue
    # -------------------------------------------------------------------
    QueueInfo:
      type: object
      description: Queue information with pending and running items
      properties:
        queue_running:
          type: array
          description: Currently running queue items
          items:
            type: array
            description: |
              Queue item tuple: [number, prompt_id, prompt, extra_data, outputs_to_execute, sensitive]
            items: {}
            prefixItems:
              - type: number
                description: Priority number
              - type: string
                format: uuid
                description: prompt_id
              - type: object
                description: prompt graph
                additionalProperties: true
              - type: object
                description: extra_data
                additionalProperties: true
              - type: array
                description: outputs_to_execute (list of output node IDs)
                items:
                  type: string
              - type: object
                description: sensitive data (may be omitted)
                additionalProperties: true
        queue_pending:
          type: array
          description: Pending queue items (oldest first)
          items:
            type: array
            description: |
              Queue item tuple: [number, prompt_id, prompt, extra_data, outputs_to_execute, sensitive]
            items: {}
            prefixItems:
              - type: number
                description: Priority number
              - type: string
                format: uuid
                description: prompt_id
              - type: object
                description: prompt graph
                additionalProperties: true
              - type: object
                description: extra_data
                additionalProperties: true
              - type: array
                description: outputs_to_execute (list of output node IDs)
                items:
                  type: string
              - type: object
                description: sensitive data (may be omitted)
                additionalProperties: true

    QueueManageRequest:
      type: object
      description: Request to clear or delete from queue
      properties:
        clear:
          type: boolean
          description: If true, clear all pending items
        delete:
          type: array
          items:
            type: string
          description: Array of prompt IDs to delete from queue

    QueueManageResponse:
      type: object
      x-runtime: [cloud]
      description: >-
        [cloud-only] Result of a queue mutation. The Cloud runtime returns which
        items were deleted and whether the queue was cleared; local ComfyUI
        returns an empty 200 body.
      properties:
        deleted:
          type: array
          nullable: true
          items:
            type: string
          description: Prompt IDs that were deleted from the queue.
        cleared:
          type: boolean
          nullable: true
          description: Whether the queue was cleared.

    # -------------------------------------------------------------------
    # History
    # -------------------------------------------------------------------
    HistoryEntry:
      type: object
      description: A single execution history entry
      properties:
        prompt:
          type: array
          description: |
            Prompt tuple: [number, prompt_id, prompt_graph, extra_data, output_node_ids]
          items: {}
        outputs:
          type: object
          description: Output data from execution keyed by node ID
          additionalProperties: true
        status:
          type: object
          description: Execution status (status_str, completed, messages, etc.)
          additionalProperties: true
        meta:
          type: object
          description: Metadata about the execution and nodes
          additionalProperties: true
        create_time:
          type: integer
          format: int64
          nullable: true
          x-runtime:
            - cloud
          description: "[cloud-only] Unix-ms timestamp when the history entry was created."
        extra_data:
          type: object
          additionalProperties: true
          nullable: true
          x-runtime:
            - cloud
          description: "[cloud-only] Workflow-attached extra_data passed through with the prompt."
        priority:
          type: number
          format: double
          nullable: true
          x-runtime:
            - cloud
          description: "[cloud-only] Scheduling priority assigned to the history entry."
        prompt_id:
          type: string
          nullable: true
          x-runtime:
            - cloud
          description: "[cloud-only] ID of the prompt this history entry belongs to."
        workflow_id:
          type: string
          nullable: true
          x-runtime:
            - cloud
          description: "[cloud-only] ID of the workflow associated with the history entry."

    HistoryManageRequest:
      type: object
      description: Request to clear or delete history entries
      properties:
        clear:
          type: boolean
          description: If true, clear all history
        delete:
          type: array
          items:
            type: string
          description: Array of prompt IDs to delete from history

    # -------------------------------------------------------------------
    # Jobs
    # -------------------------------------------------------------------
    JobEntry:
      type: object
      description: Lightweight job data for list views
      required:
        - id
        - status
      properties:
        id:
          type: string
          format: uuid
          description: Unique job identifier (same as prompt_id)
        status:
          type: string
          enum:
            - pending
            - in_progress
            - completed
            - failed
            - cancelled
          description: Current job status
        create_time:
          type: integer
          format: int64
          description: Job creation timestamp (Unix milliseconds).
        execution_start_time:
          type: integer
          format: int64
          description: Workflow execution start timestamp (Unix milliseconds, terminal states only).
        execution_end_time:
          type: integer
          format: int64
          description: Workflow execution end timestamp (Unix milliseconds, terminal states only).
        preview_output:
          type: object
          additionalProperties: true
          description: Primary preview output
        outputs_count:
          type: integer
          description: Total number of output files
        workflow_id:
          type: string
          nullable: true
          x-runtime: [cloud]
          description: "[cloud-only] UUID of the Cloud workflow entity this job is associated with. Local ComfyUI returns null."
        execution_error:
          x-runtime: [cloud]
          description: "[cloud-only] Detailed execution error from ComfyUI for failed jobs. Absent on local ComfyUI."
          allOf:
            - $ref: "#/components/schemas/ExecutionError"

    JobDetailResponse:
      type: object
      description: Full job details including workflow and outputs
      required:
        - id
        - status
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - pending
            - in_progress
            - completed
            - failed
            - cancelled
        workflow:
          type: object
          additionalProperties: true
          description: Full ComfyUI workflow
        outputs:
          type: object
          additionalProperties: true
          description: Full outputs object from execution
        execution_error:
          $ref: "#/components/schemas/ExecutionError"
        create_time:
          type: integer
          format: int64
          description: Job creation timestamp (Unix milliseconds).
        update_time:
          type: integer
          format: int64
          description: Last state-change timestamp (Unix milliseconds).
        execution_start_time:
          type: integer
          format: int64
          description: Workflow execution start timestamp (Unix milliseconds, terminal states only).
        execution_end_time:
          type: integer
          format: int64
          description: Workflow execution end timestamp (Unix milliseconds, terminal states only).
        preview_output:
          type: object
          additionalProperties: true
        outputs_count:
          type: integer
        execution_status:
          type: object
          additionalProperties: true
        execution_meta:
          type: object
          additionalProperties: true
        workflow_id:
          type: string
          nullable: true
          x-runtime:
            - cloud
          description: "[cloud-only] ID of the workflow associated with this job."

    ExecutionError:
      type: object
      description: Detailed execution error from ComfyUI
      properties:
        node_id:
          type: string
          description: ID of the node that failed
        node_type:
          type: string
          description: Type name of the node
        exception_message:
          type: string
          description: Human-readable error message
        exception_type:
          type: string
          description: Python exception type
        traceback:
          type: array
          items:
            type: string
          description: Traceback lines
        current_inputs:
          type: object
          additionalProperties: true
        current_outputs:
          type: object
          additionalProperties: true

    PaginationInfo:
      type: object
      description: Pagination metadata returned alongside list responses.
      properties:
        offset:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        has_more:
          type: boolean

    # -------------------------------------------------------------------
    # Upload / View
    # -------------------------------------------------------------------
    UploadResult:
      type: object
      description: Response body returned by the image/mask upload endpoints, describing where the uploaded file now lives.
      properties:
        name:
          type: string
          description: Saved filename (may be renamed to avoid collisions)
        subfolder:
          type: string
          description: Subfolder the file was saved to
        type:
          type: string
          description: Directory type (input, temp)

    # -------------------------------------------------------------------
    # System
    # -------------------------------------------------------------------
    DeviceStats:
      type: object
      description: GPU/compute device statistics
      required:
        - name
        - type
        - index
      properties:
        name:
          type: string
          description: Device name
        type:
          type: string
          description: Device type (cuda, mps, cpu, etc.)
        index:
          type: number
          nullable: true
          description: |
            Device index within its type (e.g. CUDA ordinal for `cuda:0`,
            `cuda:1`). `null` for devices with no index, including the CPU
            device returned in `--cpu` mode (PyTorch's `torch.device('cpu').index`
            is `None`).
        vram_total:
          type: number
          description: Total VRAM in bytes
        vram_free:
          type: number
          description: Free VRAM in bytes
        torch_vram_total:
          type: number
          description: Total PyTorch-managed VRAM in bytes
        torch_vram_free:
          type: number
          description: Free PyTorch-managed VRAM in bytes

    SystemStatsResponse:
      type: object
      description: Hardware, VRAM, Python, and ComfyUI version information for the running process.
      required:
        - system
        - devices
      properties:
        system:
          type: object
          required:
            - os
            - python_version
            - embedded_python
            - comfyui_version
            - pytorch_version
            - argv
            - ram_total
            - ram_free
          properties:
            os:
              type: string
              description: Operating system
            python_version:
              type: string
              description: Python version
            embedded_python:
              type: boolean
              description: Whether using embedded Python
            comfyui_version:
              type: string
              description: ComfyUI version string
            pytorch_version:
              type: string
              description: PyTorch version
            required_frontend_version:
              type: string
              description: Required frontend version
            argv:
              type: array
              items:
                type: string
              description: Command line arguments
            ram_total:
              type: number
              description: Total RAM in bytes
            ram_free:
              type: number
              description: Free RAM in bytes
            installed_templates_version:
              type: string
              nullable: true
              description: Version of the currently installed workflow templates
            required_templates_version:
              type: string
              nullable: true
              description: Minimum required workflow templates version for this ComfyUI build
            comfy_package_versions:
              type: array
              description: Installed and required versions for every comfy* package pinned in requirements.txt
              items:
                type: object
                required:
                  - name
                  - installed
                  - required
                properties:
                  name:
                    type: string
                  installed:
                    type: string
                    nullable: true
                  required:
                    type: string
                    nullable: true
        devices:
          type: array
          items:
            $ref: "#/components/schemas/DeviceStats"

    # -------------------------------------------------------------------
    # Node / Object Info
    # -------------------------------------------------------------------
        cloud_version:
          type: string
          nullable: true
          x-runtime:
            - cloud
          description: "[cloud-only] Version identifier of the cloud control plane."
        comfyui_frontend_version:
          type: string
          nullable: true
          x-runtime:
            - cloud
          description: "[cloud-only] Pinned ComfyUI frontend version served by the cloud."
        workflow_templates_version:
          type: string
          nullable: true
          x-runtime:
            - cloud
          description: "[cloud-only] Pinned workflow-templates version served by the cloud."
    NodeInfo:
      type: object
      description: 'Definition of a registered node class: its inputs, outputs, category, and display metadata.'
      properties:
        input:
          type: object
          description: Input specifications (required and optional groups)
          additionalProperties: true
        input_order:
          type: object
          description: Ordered input names per group
          additionalProperties:
            type: array
            items:
              type: string
        output:
          type: array
          items:
            type: string
          description: Output type names
        output_is_list:
          type: array
          items:
            type: boolean
          description: Whether each output is a list
        output_name:
          type: array
          items:
            type: string
          description: Display names of outputs
        name:
          type: string
          description: Internal class name
        display_name:
          type: string
          description: Human-readable display name
        description:
          type: string
          description: Node description
        python_module:
          type: string
          description: Python module implementing the node
        category:
          type: string
          description: Node category path
        output_node:
          type: boolean
          description: Whether this is an output node
        output_tooltips:
          type: array
          items:
            type: string
          description: Tooltips for each output
        deprecated:
          type: boolean
          description: Whether the node is deprecated
        experimental:
          type: boolean
          description: Whether the node is experimental
        api_node:
          type: boolean
          description: Whether this is an API node
        is_input_list:
          type: boolean
          description: Whether the node accepts list inputs
        dev_only:
          type: boolean
          description: Whether the node is developer-only (hidden in production UI)
        has_intermediate_output:
          type: boolean
          description: Whether the node emits intermediate output during execution
        search_aliases:
          type: array
          items:
            type: string
          description: Alternative search terms for finding this node
        essentials_category:
          type: string
          nullable: true
          description: |
            Category override used by the essentials pack. The
            `essentials_category` key may be present with a string value,
            present and `null`, or absent entirely:

            - V1 nodes: `essentials_category` is **omitted** when the node
              class doesn't define an `ESSENTIALS_CATEGORY` attribute, and
              **`null`** if the attribute is explicitly set to `None`.
            - V3 nodes (`comfy_api.latest.io`): `essentials_category` is
              **always present**, and **`null`** for nodes whose `Schema`
              doesn't populate it.

    # -------------------------------------------------------------------
    # Models
    # -------------------------------------------------------------------
    ModelFolder:
      type: object
      description: A configured model folder and the list of disk paths it resolves to.
      required:
        - name
        - folders
      properties:
        name:
          type: string
          description: Model folder type name (e.g. "checkpoints")
        folders:
          type: array
          items:
            type: string
          description: Filesystem paths for this model type

    ModelFile:
      type: object
      description: A single model file in a folder, with filesystem metadata.
      required:
        - name
        - pathIndex
      properties:
        name:
          type: string
          description: Model filename
        pathIndex:
          type: integer
          description: Index into the folder's paths array
        modified:
          type: number
          description: File modification timestamp
        created:
          type: number
          description: File creation timestamp
        size:
          type: integer
          format: int64
          description: File size in bytes

    # -------------------------------------------------------------------
    # Subgraphs
    # -------------------------------------------------------------------
    GlobalSubgraphInfo:
      type: object
      description: Metadata for a global subgraph blueprint (without full data)
      required:
        - source
        - name
        - info
      properties:
        source:
          type: string
          description: Source type ("templates" or "custom_node")
        name:
          type: string
          description: Display name of the subgraph blueprint
        info:
          type: object
          description: Additional information about the subgraph
          required:
            - node_pack
          properties:
            node_pack:
              type: string
              description: The node pack/module providing this subgraph
        data:
          type: string
          description: The full subgraph JSON data (may be empty in list view)

    GlobalSubgraphData:
      type: object
      description: Full data for a global subgraph blueprint
      required:
        - source
        - name
        - info
        - data
      properties:
        source:
          type: string
          description: Source type ("templates" or "custom_node")
        name:
          type: string
          description: Display name of the subgraph blueprint
        info:
          type: object
          description: Additional information about the subgraph
          required:
            - node_pack
          properties:
            node_pack:
              type: string
              description: The node pack/module providing this subgraph
        data:
          type: string
          description: The full subgraph JSON data as a string

    # -------------------------------------------------------------------
    # Userdata
    # -------------------------------------------------------------------
    UserDataResponse:
      description: |
        Response body for the POST endpoints `/api/userdata/{file}` and
        `/api/userdata/{file}/move/{dest}`. Returns a single item whose
        shape depends on the `full_info` query parameter.
      x-variant-selector:
        full_info=true: file-info object (`GetUserDataResponseFullFile`)
        default: relative path string
      oneOf:
        - $ref: "#/components/schemas/GetUserDataResponseFullFile"
        - type: string
          description: Relative path of the written or moved file. Returned when `full_info` is absent or false.

    ListUserdataResponse:
      description: |
        Response body for `GET /api/userdata`. The array item shape is
        determined by the `full_info` and `split` query parameters.
      x-variant-selector:
        full_info=true: array of file-info objects (`GetUserDataResponseFullFile`)
        split=true: array of `[relative_path, ...path_components]` arrays
        default: array of relative path strings
      oneOf:
        - type: array
          items:
            $ref: "#/components/schemas/GetUserDataResponseFullFile"
          description: Returned when `full_info=true`.
        - type: array
          items:
            type: array
            items:
              type: string
            minItems: 2
          description: |
            Returned when `split=true` and `full_info=false`. Each inner
            array is `[relative_path, ...path_components]`.
        - type: array
          items:
            type: string
          description: Default shape — array of file paths relative to the user data root.

    GetUserDataResponseFullFile:
      type: object
      description: A single entry in a full-info user data listing.
      properties:
        path:
          type: string
          description: File name or path relative to the user directory
        created:
          type: number
          description: Unix timestamp of file creation
        size:
          type: integer
          description: File size in bytes
        modified:
          type: integer
          format: int64
          description: Unix timestamp of last modification in milliseconds

    # -------------------------------------------------------------------
    # Assets
    # -------------------------------------------------------------------
    Asset:
      type: object
      description: A registered asset — an input/output file tracked in the asset database with content hash and metadata.
      required:
        - id
        - name
        - size
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the asset
        name:
          type: string
          description: Name of the asset file
        display_name:
          type: string
          nullable: true
          x-runtime:
            - cloud
          description: "[cloud-only] Human-friendly display name for the asset. Cloud-populated; null in local ComfyUI."
        hash:
          type: string
          nullable: true
          description: Blake3 content hash of the asset (preferred over asset_hash)
          pattern: "^blake3:[a-f0-9]{64}$"
        asset_hash:
          type: string
          nullable: true
          deprecated: true
          description: "Deprecated: use `hash` instead. Blake3 hash of the asset content."
          pattern: "^blake3:[a-f0-9]{64}$"
        size:
          type: integer
          format: int64
          description: Size of the asset in bytes
        mime_type:
          type: string
          description: MIME type of the asset
        tags:
          type: array
          items:
            type: string
          description: Tags associated with the asset
        user_metadata:
          type: object
          description: Custom user metadata
          additionalProperties: true
        metadata:
          type: object
          description: System-managed metadata (read-only)
          additionalProperties: true
          readOnly: true
        preview_url:
          type: string
          format: uri
          description: URL for asset preview/thumbnail
        preview_id:
          type: string
          format: uuid
          description: ID of the preview asset if available
        prompt_id:
          type: string
          format: uuid
          nullable: true
          deprecated: true
          description: "Deprecated: use job_id instead. ID of the prompt that created this asset."
        job_id:
          type: string
          format: uuid
          nullable: true
          description: ID of the job that created this asset
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        last_access_time:
          type: string
          format: date-time
        is_immutable:
          type: boolean
          description: Whether this asset is immutable

    AssetCreated:
      description: Response body returned after successfully registering a new asset.
      allOf:
        - $ref: "#/components/schemas/Asset"
        - type: object
          required:
            - created_new
          properties:
            created_new:
              type: boolean
              description: Whether this was a new creation (true) or returned existing (false)

    AssetUpdated:
      type: object
      description: Response body returned after updating an asset's metadata.
      required:
        - id
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        hash:
          type: string
          nullable: true
          description: Blake3 content hash of the asset (preferred over asset_hash)
          pattern: "^blake3:[a-f0-9]{64}$"
        asset_hash:
          type: string
          nullable: true
          deprecated: true
          description: "Deprecated: use `hash` instead. Blake3 hash of the asset content."
          pattern: "^blake3:[a-f0-9]{64}$"
        tags:
          type: array
          items:
            type: string
        mime_type:
          type: string
        user_metadata:
          type: object
          additionalProperties: true
        prompt_id:
          type: string
          format: uuid
          nullable: true
          deprecated: true
          description: "Deprecated: use job_id instead. ID of the prompt that created this asset."
        job_id:
          type: string
          format: uuid
          nullable: true
          description: ID of the job that created this asset
        updated_at:
          type: string
          format: date-time
        display_name:
          type: string
          nullable: true
          x-runtime:
            - cloud
          description: "[cloud-only] Human-friendly display name for the updated asset."

    ListAssetsResponse:
      type: object
      description: Paginated list of assets.
      required:
        - assets
        - total
        - has_more
      properties:
        assets:
          type: array
          items:
            $ref: "#/components/schemas/Asset"
        total:
          type: integer
        has_more:
          type: boolean
        next_cursor:
          type: string
          nullable: true
          x-runtime:
            - cloud
          description: "[cloud-only] Opaque cursor for fetching the next page of assets; absent when no more pages."

    TagInfo:
      type: object
      description: A tag known to the asset database, with the number of assets bearing it.
      required:
        - name
        - count
      properties:
        name:
          type: string
        count:
          type: integer

    ListTagsResponse:
      type: object
      description: Flat list of all tags, with counts.
      required:
        - tags
        - total
        - has_more
      properties:
        tags:
          type: array
          items:
            $ref: "#/components/schemas/TagInfo"
        total:
          type: integer
        has_more:
          type: boolean

    AssetTagHistogramResponse:
      type: object
      description: Tags that would refine a filtered asset query, with the count of assets each tag would additionally select.
      required:
        - tag_counts
      properties:
        tag_counts:
          type: object
          additionalProperties:
            type: integer
          description: Map of tag names to occurrence counts

    TagsModificationResponse:
      type: object
      description: Response body returned after adding or removing tags on an asset.
      required:
        - total_tags
      properties:
        added:
          type: array
          items:
            type: string
          description: Tags successfully added
        removed:
          type: array
          items:
            type: string
          description: Tags successfully removed
        already_present:
          type: array
          items:
            type: string
          description: Tags already present (for add)
        not_present:
          type: array
          items:
            type: string
          description: Tags not present (for remove)
        total_tags:
          type: array
          items:
            type: string
          description: All tags on the asset after the operation

    # -------------------------------------------------------------------
    # Result / Output types
    # -------------------------------------------------------------------
    ResultItem:
      type: object
      description: A single output file reference
      properties:
        filename:
          type: string
        subfolder:
          type: string
        type:
          type: string
          enum: [input, output, temp]
        display_name:
          type: string

    NodeOutputs:
      type: object
      description: |
        Outputs from a single node execution. Known keys are listed below,
        but custom nodes may add arbitrary keys (additionalProperties).
      properties:
        images:
          type: array
          items:
            $ref: "#/components/schemas/ResultItem"
        audio:
          type: array
          items:
            $ref: "#/components/schemas/ResultItem"
        video:
          type: array
          items:
            $ref: "#/components/schemas/ResultItem"
        animated:
          type: array
          items:
            type: boolean
        text:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
      additionalProperties: true

    TerminalSize:
      type: object
      description: Terminal dimensions
      properties:
        cols:
          type: number
        row:
          type: number

    LogEntry:
      type: object
      description: A single log entry
      properties:
        t:
          type: string
          description: Timestamp
        m:
          type: string
          description: Log message

    StatusWsMessageStatus:
      type: object
      description: Inner payload of a `status` WebSocket message, describing the execution queue state.
      properties:
        exec_info:
          type: object
          required:
            - queue_remaining
          properties:
            queue_remaining:
              type: integer

    StatusWsMessage:
      type: object
      description: Initial status message sent on connect + queue status updates
      properties:
        status:
          $ref: "#/components/schemas/StatusWsMessageStatus"
        sid:
          type: string
          description: Session ID assigned by the server

    ProgressWsMessage:
      type: object
      description: Node execution progress (step N of M)
      required:
        - value
        - max
        - prompt_id
        - node
      properties:
        value:
          type: integer
          description: Current step
        max:
          type: integer
          description: Total steps
        prompt_id:
          type: string
        node:
          type: string
          description: Node ID currently executing

    ProgressTextWsMessage:
      type: object
      description: Text-based progress update from a node
      properties:
        nodeId:
          type: string
        text:
          type: string
        prompt_id:
          type: string

    NodeProgressState:
      type: object
      description: Progress state for a single node
      properties:
        value:
          type: number
        max:
          type: number
        state:
          type: string
          enum: [pending, running, finished, error]
        node_id:
          type: string
        prompt_id:
          type: string
        display_node_id:
          type: string
        parent_node_id:
          type: string
        real_node_id:
          type: string

    ProgressStateWsMessage:
      type: object
      description: Bulk progress state for all nodes in a prompt
      required:
        - prompt_id
        - nodes
      properties:
        prompt_id:
          type: string
        nodes:
          type: object
          description: Map of node ID to progress state
          additionalProperties:
            $ref: "#/components/schemas/NodeProgressState"

    ExecutingWsMessage:
      type: object
      description: Fired when a node begins execution
      required:
        - node
        - display_node
        - prompt_id
      properties:
        node:
          type: string
          description: Node ID
        display_node:
          type: string
          description: Display node ID (may differ for subgraphs)
        prompt_id:
          type: string

    ExecutedWsMessage:
      type: object
      description: Fired when a node completes execution with output
      required:
        - node
        - display_node
        - prompt_id
        - output
      properties:
        node:
          type: string
        display_node:
          type: string
        prompt_id:
          type: string
        output:
          $ref: "#/components/schemas/NodeOutputs"
        merge:
          type: boolean
          description: Whether to merge with existing output

    ExecutionWsMessageBase:
      type: object
      description: Base fields for execution lifecycle messages
      required:
        - prompt_id
        - timestamp
      properties:
        prompt_id:
          type: string
        timestamp:
          type: integer
          description: Unix timestamp in milliseconds

    ExecutionStartWsMessage:
      allOf:
        - $ref: "#/components/schemas/ExecutionWsMessageBase"
      description: Fired when prompt execution begins

    ExecutionSuccessWsMessage:
      allOf:
        - $ref: "#/components/schemas/ExecutionWsMessageBase"
      description: Fired when prompt execution completes successfully

    ExecutionCachedWsMessage:
      allOf:
        - $ref: "#/components/schemas/ExecutionWsMessageBase"
        - type: object
          properties:
            nodes:
              type: array
              items:
                type: string
              description: List of node IDs that were cached
      description: Fired when nodes are served from cache

    ExecutionInterruptedWsMessage:
      allOf:
        - $ref: "#/components/schemas/ExecutionWsMessageBase"
        - type: object
          properties:
            node_id:
              type: string
            node_type:
              type: string
            executed:
              type: array
              items:
                type: string
              description: Node IDs that completed before interruption
      description: Fired when execution is interrupted by user

    ExecutionErrorWsMessage:
      allOf:
        - $ref: "#/components/schemas/ExecutionWsMessageBase"
        - type: object
          properties:
            node_id:
              type: string
            node_type:
              type: string
            executed:
              type: array
              items:
                type: string
            exception_message:
              type: string
            exception_type:
              type: string
            traceback:
              type: array
              items:
                type: string
            current_inputs: {}
            current_outputs: {}
      description: Fired when a node throws an exception during execution

    LogsWsMessage:
      type: object
      description: Streaming log entries from the server
      properties:
        size:
          $ref: "#/components/schemas/TerminalSize"
        entries:
          type: array
          items:
            $ref: "#/components/schemas/LogEntry"

    NotificationWsMessage:
      type: object
      description: Server notification (e.g. model download complete)
      properties:
        value:
          type: string
        id:
          type: string

    FeatureFlagsWsMessage:
      type: object
      description: Feature flags sent on connect
      additionalProperties: true

    AssetDownloadWsMessage:
      type: object
      description: Asset download progress
      required:
        - task_id
        - asset_name
        - bytes_total
        - bytes_downloaded
        - progress
        - status
      properties:
        task_id:
          type: string
        asset_name:
          type: string
        bytes_total:
          type: number
        bytes_downloaded:
          type: number
        progress:
          type: number
          description: 0.0 to 1.0
        status:
          type: string
          enum: [created, running, completed, failed]
        asset_id:
          type: string
        error:
          type: string

    AssetExportWsMessage:
      type: object
      description: Bulk asset export progress
      required:
        - task_id
        - assets_total
        - assets_attempted
        - assets_failed
        - bytes_total
        - bytes_processed
        - progress
        - status
      properties:
        task_id:
          type: string
        export_name:
          type: string
        assets_total:
          type: number
        assets_attempted:
          type: number
        assets_failed:
          type: number
        bytes_total:
          type: number
        bytes_processed:
          type: number
        progress:
          type: number
          description: 0.0 to 1.0
        status:
          type: string
          enum: [created, running, completed, failed]
        error:
          type: string

    # -------------------------------------------------------------------
    # Cloud-runtime schemas
    #
    # These schemas are exclusively referenced by cloud-runtime operations.
    # Tagged x-runtime: [cloud].
    # -------------------------------------------------------------------
    CloudError:
      type: object
      x-runtime: [cloud]
      description: "[cloud-only] Standard error response from cloud endpoints."
      required:
        - error
      properties:
        error:
          type: string
          description: Error message
        code:
          type: string
          description: Machine-readable error code
        details:
          type: object
          additionalProperties: true
          description: Additional error context

    CloudJobStatus:
      type: object
      x-runtime: [cloud]
      description: "[cloud-only] Status of a cloud job."
      required:
        - id
        - status
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, running, completed, failed, cancelled]
        progress:
          type: number
          minimum: 0
          maximum: 1
          description: "Execution progress (0.0 to 1.0)"
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true

    CloudPrompt:
      type: object
      x-runtime: [cloud]
      description: "[cloud-only] A cloud-executed prompt record."
      required:
        - id
        - status
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
        workflow:
          type: object
          additionalProperties: true
        outputs:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true

    HistoryV2Response:
      type: object
      x-runtime: [cloud]
      description: "[cloud-only] Paginated execution history in v2 format."
      required:
        - items
        - total
        - has_more
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/HistoryV2Entry"
        total:
          type: integer
        has_more:
          type: boolean

    HistoryV2Entry:
      type: object
      x-runtime: [cloud]
      description: "[cloud-only] A single execution history entry in v2 format."
      required:
        - id
        - status
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
        workflow:
          type: object
          additionalProperties: true
        outputs:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        preview_output:
          type: object
          additionalProperties: true

    CloudLogsResponse:
      type: object
      x-runtime: [cloud]
      description: "[cloud-only] Paginated cloud execution logs."
      required:
        - entries
      properties:
        entries:
          type: array
          items:
            type: object
            properties:
              timestamp:
                type: string
                format: date-time
              level:
                type: string
                enum: [debug, info, warn, error]
              message:
                type: string
              job_id:
                type: string
                format: uuid
        total:
          type: integer
        has_more:
          type: boolean

    AssetDownloadRequest:
      type: object
      x-runtime: [cloud]
      description: "[cloud-only] A single asset to download to the cloud runtime."
      required:
        - asset_id
      properties:
        asset_id:
          type: string
          format: uuid
          description: ID of the asset to download
        target_path:
          type: string
          description: Target path on the runtime filesystem

    ImportPublishedAssetsRequest:
      type: object
      x-runtime: [cloud]
      description: "[cloud-only] Request body for importing published assets into the caller's library."
      required:
        - published_asset_ids
      properties:
        published_asset_ids:
          type: array
          description: IDs of published assets (inputs and models) to import.
          items:
            type: string
        share_id:
          type: string
          nullable: true
          description: |
            Optional. Share ID of the published workflow these assets belong to. When provided (non-null, non-empty): all `published_asset_ids` must belong to this share's workflow version; returns 400 if the share is not found or any asset does not belong to it. When omitted, null, or empty string: no share-scoped validation is performed and the assets are validated only against global rules (preserved for clients that have not yet adopted `share_id`).

    ImportPublishedAssetsResponse:
      type: object
      x-runtime: [cloud]
      description: "[cloud-only] Response after importing published assets. Each returned `AssetInfo.id` is the caller's newly-created private asset ID, not the published asset ID supplied in the request."
      required:
        - assets
      properties:
        assets:
          type: array
          items:
            $ref: "#/components/schemas/AssetInfo"

    RemoteAssetMetadata:
      type: object
      x-runtime: [cloud]
      description: "[cloud-only] Metadata fetched from a remote asset URL."
      properties:
        content_type:
          type: string
          description: MIME type of the remote file
        content_length:
          type: integer
          format: int64
          description: Size in bytes
        filename:
          type: string
          description: Suggested filename from Content-Disposition or URL

    CloudNode:
      type: object
      x-runtime: [cloud]
      description: "[cloud-only] An installed custom node package in the cloud runtime."
      required:
        - id
        - name
      properties:
        id:
          type: string
        name:
          type: string
        version:
          type: string
        description:
          type: string
        author:
          type: string
        repository:
          type: string
          format: uri
        installed_at:
          type: string
          format: date-time
        enabled:
          type: boolean

    HubLabel:
      type: object
      x-runtime: [cloud]
      description: "[cloud-only] A label/category used for tagging hub content."
      required:
        - id
        - name
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        color:
          type: string
          description: Hex color code for the label

    HubProfile:
      type: object
      x-runtime: [cloud]
      description: "[cloud-only] A public user profile on the ComfyUI Hub."
      required:
        - username
      properties:
        username:
          type: string
        display_name:
          type: string
        bio:
          type: string
        avatar_url:
          type: string
          format: uri
        links:
          type: array
          items:
            type: string
            format: uri
        workflow_count:
          type: integer
        created_at:
          type: string
          format: date-time
        description:
          type: string
          nullable: true
          x-runtime:
            - cloud
          description: "[cloud-only] Profile description / bio."
        website_urls:
          type: array
          items:
            type: string
          nullable: true
          x-runtime:
            - cloud
          description: "[cloud-only] List of websites/social links associated with the profile."

    HubWorkflow:
      type: object
      x-runtime: [cloud]
      description: "[cloud-only] A published workflow on the ComfyUI Hub."
      required:
        - share_id
        - name
      properties:
        share_id:
          type: string
        name:
          type: string
        description:
          type: string
        author:
          $ref: "#/components/schemas/HubProfile"
        labels:
          type: array
          items:
            $ref: "#/components/schemas/HubLabel"
        thumbnail_url:
          type: string
          format: uri
        content:
          type: object
          additionalProperties: true
          description: Workflow graph JSON
        likes:
          type: integer
        views:
          type: integer
        forks:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    HubWorkflowList:
      type: object
      x-runtime: [cloud]
      description: "[cloud-only] Paginated list of hub workflows."
      required:
        - workflows
        - total
        - has_more
      properties:
        workflows:
          type: array
          items:
            $ref: "#/components/schemas/HubWorkflow"
        total:
          type: integer
        has_more:
          type: boolean

    HubWorkflowIndexEntry:
      type: object
      x-runtime: [cloud]
      description: "[cloud-only] Lightweight entry in the hub workflow index for client-side search."
      required:
        - share_id
        - name
      properties:
        share_id:
          type: string
        name:
          type: string
        author_username:
          type: string
        labels:
          type: array
          items:
            type: string
        likes:
          type: integer
        updated_at:
          type: string
          format: date-time

    CloudWorkflow:
      type: object
      x-runtime: [cloud]
      description: "[cloud-only] A cloud-managed workflow with version history."
      required:
        - id
        - name
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        share_id:
          type: string
          nullable: true
          description: Public share identifier if published
        latest_version_id:
          type: string
          format: uuid
          nullable: true
        thumbnail_url:
          type: string
          format: uri
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CloudWorkflowList:
      type: object
      x-runtime: [cloud]
      description: "[cloud-only] Paginated list of cloud workflows."
      required:
        - workflows
        - total
        - has_more
      properties:
        workflows:
          type: array
          items:
            $ref: "#/components/schemas/CloudWorkflow"
        total:
          type: integer
        has_more:
          type: boolean

    CloudWorkflowVersion:
      type: object
      x-runtime: [cloud]
      description: "[cloud-only] A version of a cloud workflow."
      required:
        - id
        - workflow_id
      properties:
        id:
          type: string
