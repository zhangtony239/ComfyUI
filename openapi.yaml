                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Subgraph not found
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Internal server error
            security: []
            summary: Get a specific subgraph blueprint
            tags:
                - workflow
    /api/history:
